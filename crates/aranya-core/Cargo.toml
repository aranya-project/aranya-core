[package]
name = "aranya-core"
description = "Stable public API for the Aranya runtime"
version = "0.0.1-alpha"
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
aranya-crypto = { version = "0.14.0", default-features = false }
aranya-runtime = { version = "0.22.0", default-features = false }

[features]
default = []

libc = ["aranya-runtime/libc"]

std = [
	"aranya-crypto/std",
	"aranya-runtime/std",
]

low-mem-usage = ["aranya-runtime/low-mem-usage"]

[dev-dependencies]
anyhow = "1"
aranya-core = { path = ".", features = ["std", "libc"] }
aranya-crypto = { version = "0.14.0", features = ["std", "alloc", "getrandom", "memstore"] }
aranya-crypto-ffi = "*"
aranya-device-ffi = "*"
aranya-envelope-ffi = "*"
aranya-idam-ffi = "*"
aranya-perspective-ffi = "*"
aranya-policy-compiler = "*"
aranya-policy-lang = "*"
aranya-policy-vm = "*"
postcard = { workspace = true, features = ["alloc"] }

[[example]]
name = "simple"
path = "examples/simple.rs"
required-features = ["std", "libc"]
