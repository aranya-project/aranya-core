name: "Coverage"

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

env:
  REV: ${{ github.run_id }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup

      - name: Branch coverage
        run: cargo make coverage

      - name: Coverage summary
        run: |
          for bucket in capi tools compiler core-prod; do
            {
              echo "### Branch coverage: ${bucket}"
              echo '```'
              cat "target/llvm-cov/${bucket}/coverage.txt"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload C API coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-capi
          path: target/llvm-cov/capi
          if-no-files-found: error

      - name: Upload tools coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-tools
          path: target/llvm-cov/tools
          if-no-files-found: error

      - name: Upload policy compiler coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-compiler
          path: target/llvm-cov/compiler
          if-no-files-found: error

      - name: Upload core production coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-core-prod
          path: target/llvm-cov/core-prod
          if-no-files-found: error
